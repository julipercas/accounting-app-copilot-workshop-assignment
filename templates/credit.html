{% extends "base.html" %}

{% block title %}Credit Account - Accounting System{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Credit Account</h2>
</div>

<div class="form-card">
    <p class="current-balance-info">
        Current Balance: <strong>{{ balance|format_currency }}</strong>
    </p>

    <form method="POST" action="{{ url_for('credit') }}" class="transaction-form">
        <div class="form-group">
            <label for="amount">Amount to Credit:</label>
            <input 
                type="number" 
                id="amount" 
                name="amount" 
                step="0.01" 
                min="0.01" 
                max="999999.99"
                required 
                autofocus
                placeholder="0.00"
            >
            <p class="help-text">Enter the amount you want to add to your account</p>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">Credit Account</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
